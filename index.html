<!DOCTYPE html>
<html>
<head>
    <title>Math Quiz - 10 Sec Challenge</title>
    <style>
        body { font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #1a1a2e; margin: 0; color: white; }
        #game-container { text-align: center; background: #16213e; padding: 40px; border-radius: 20px; border: 2px solid #0f3460; width: 90%; max-width: 600px; }
        
        .header-info { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 1.2rem; border-bottom: 2px solid #0f3460; padding-bottom: 10px; }
        #timer-box { color: #e94560; font-size: 1.5rem; font-weight: bold; }
        
        #question { font-size: 26px; margin: 30px 0; min-height: 60px; color: #e0e0e0; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .answer-btn { padding: 20px; font-size: 20px; cursor: pointer; border: none; border-radius: 10px; background-color: #0f3460; color: white; transition: 0.2s; }
        .answer-btn:hover:not(:disabled) { background-color: #e94560; }
        .answer-btn:disabled { opacity: 0.6; cursor: default; }
        
        #feedback { font-size: 22px; margin-top: 20px; height: 30px; font-weight: bold; }
        .hidden { display: none; }
        #restart-btn { padding: 15px 30px; font-size: 20px; background: #e94560; color: white; border: none; border-radius: 10px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="quiz-ui">
            <div class="header-info">
                <div>Score: <span id="score">0</span></div>
                <div>Q: <span id="q-number">1</span>/20</div>
                <div id="timer-box">⏳ <span id="seconds">10</span>s</div>
            </div>
            
            <div id="question">Loading Question...</div>
            
            <div class="btn-grid">
                <button class="answer-btn" onclick="handleChoice(0)"></button>
                <button class="answer-btn" onclick="handleChoice(1)"></button>
                <button class="answer-btn" onclick="handleChoice(2)"></button>
                <button class="answer-btn" onclick="handleChoice(3)"></button>
            </div>
            
            <div id="feedback"></div>
        </div>

        <div id="result-screen" class="hidden">
            <h1>Finished!</h1>
            <p style="font-size: 24px;">Your Score: <span id="final-score">0</span>/20</p>
            <button id="restart-btn" onclick="location.reload()">Restart Game</button>
        </div>
    </div>

    <script>
        let score = 0;
        let count = 0;
        let timeLeft = 10;
        let clock;
        let currentQ = {};

        const mathData = [
            { q: "What is -12 + 7?", a: ["-5", "5", "-19", "19"], c: 0 },
            { q: "Solve for x: x - 5 = 12", a: ["7", "17", "-7", "60"], c: 1 },
            { q: "What is 25% of 80?", a: ["10", "15", "20", "25"], c: 2 },
            { q: "Simplify: 3(x + 2)", a: ["3x+2", "3x+6", "x+6", "5x"], c: 1 },
            { q: "Area of a square with side 6?", a: ["12", "24", "36", "48"], c: 2 },
            { q: "2/5 as a decimal?", a: ["0.2", "0.4", "0.5", "0.25"], c: 1 },
            { q: "Mean of 2, 4, 6?", a: ["3", "4", "5", "6"], c: 1 },
            { q: "What is (-3) * (-4)?", a: ["-7", "7", "-12", "12"], c: 3 },
            { q: "Solve: 10 / 0.5", a: ["5", "10.5", "15", "20"], c: 3 },
            { q: "Radius = 5. Diameter = ?", a: ["2.5", "10", "15", "25"], c: 1 },
            { q: "3² + 4² = ?", a: ["7", "14", "25", "49"], c: 2 },
            { q: "Greater value: -10 or -2?", a: ["-10", "-2", "Equal", "None"], c: 1 },
            { q: "Solve for y: 3y = 21", a: ["6", "7", "8", "9"], c: 1 },
            { q: "What is 1/2 + 1/4?", a: ["1/6", "2/6", "3/4", "2/4"], c: 2 },
            { q: "Straight line angle?", a: ["90°", "180°", "270°", "360°"], c: 1 },
            { q: "1000 x 0.01 = ?", a: ["1", "10", "100", "0.1"], c: 1 },
            { q: "Is 27 a prime number?", a: ["Yes", "No", "Maybe", "Sometimes"], c: 1 },
            { q: "Solve: 5 + 2 * 3", a: ["21", "11", "10", "13"], c: 1 },
            { q: "What is 15 - (-5)?", a: ["10", "20", "-10", "-20"], c: 1 },
            { q: "Probability of Heads?", a: ["0", "1", "0.5", "0.25"], c: 2 }
        ];

        function runClock() {
            timeLeft = 10;
            document.getElementById('seconds').innerText = timeLeft;
            clearInterval(clock);
            
            clock = setInterval(() => {
                timeLeft--;
                document.getElementById('seconds').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(clock);
                    handleChoice(-1); // Fail due to time
                }
            }, 1000);
        }

        function loadQ() {
            if (count >= 20) {
                document.getElementById('quiz-ui').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');
                document.getElementById('final-score').innerText = score;
                return;
            }

            const feedback = document.getElementById('feedback');
            feedback.innerText = "";
            document.getElementById('q-number').innerText = count + 1;
            
            currentQ = mathData[count]; // Uses questions in order to ensure 20 unique ones
            document.getElementById('question').innerText = currentQ.q;
            
            const btns = document.querySelectorAll('.answer-btn');
            btns.forEach((b, i) => {
                b.innerText = currentQ.a[i];
                b.disabled = false;
            });

            runClock();
        }

        function handleChoice(idx) {
            clearInterval(clock);
            const feedback = document.getElementById('feedback');
            const btns = document.querySelectorAll('.answer-btn');
            btns.forEach(b => b.disabled = true);

            if (idx === currentQ.c) {
                score++;
                feedback.style.color = "#2ecc71";
                feedback.innerText = "Correct! +1";
            } else if (idx === -1) {
                feedback.style.color = "#f1c40f";
                feedback.innerText = "Time's Up!";
            } else {
                feedback.style.color = "#e74c3c";
                feedback.innerText = "Wrong answer!";
            }

            document.getElementById('score').innerText = score;
            count++;
            setTimeout(loadQ, 1200);
        }

        loadQ();
    </script>
</body>
</html>
